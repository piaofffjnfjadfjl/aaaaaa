<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>進化版モグラたたき</title>
<style>
body {
  text-align: center;
  font-family: sans-serif;
  background: #87ceeb;
}

h1 { margin-top: 10px; }

#game {
  display: grid;
  grid-template-columns: repeat(3, 120px);
  gap: 20px;
  justify-content: center;
  margin-top: 30px;
}

.hole {
  width: 120px;
  height: 120px;
  background: #654321;
  border-radius: 50%;
  position: relative;
  overflow: hidden;
}

.mole {
  width: 80px;
  height: 80px;
  background: red; /* 目立つ色 */
  border-radius: 50%;
  position: absolute;
  bottom: -80px;
  left: 20px;
  transition: 0.2s;
  cursor: pointer;
}

/* 出現 */
.up {
  bottom: 20px;
}

/* 叩いたとき */
.hit {
  background: yellow;
  transform: scale(0.8);
}

#info {
  margin-top: 20px;
  font-size: 20px;
}

button {
  margin: 10px;
  padding: 10px 20px;
  font-size: 18px;
  cursor: pointer;
}
</style>
</head>
<body>

<h1>🐹 モグラたたきゲーム</h1>

<div id="info">
スコア: <span id="score">0</span> |
残り時間: <span id="time">30</span>
</div>

<div>
  <button onclick="startGame()">スタート</button>
  <button onclick="resetGame()">リプレイ</button>
</div>

<div id="game"></div>

<script>
const game = document.getElementById("game");
const scoreEl = document.getElementById("score");
const timeEl = document.getElementById("time");

let score = 0;
let time = 30;
let holes = [];
let currentMole = null;
let interval = null;

// 穴生成
for (let i = 0; i < 9; i++) {
  let hole = document.createElement("div");
  hole.className = "hole";

  let mole = document.createElement("div");
  mole.className = "mole";

  mole.onclick = () => {
    if (mole === currentMole) {
      score++;
      scoreEl.textContent = score;

      // ヒット演出
      mole.classList.add("hit");
      setTimeout(() => mole.classList.remove("hit"), 200);

      mole.classList.remove("up");
      currentMole = null;
    }
  };

  hole.appendChild(mole);
  game.appendChild(hole);
  holes.push(mole);
}

// モグラ出現
function showMole() {
  if (currentMole) currentMole.classList.remove("up");

  let index = Math.floor(Math.random() * holes.length);
  currentMole = holes[index];
  currentMole.classList.add("up");
}

// スタート
function startGame() {
  if (interval) return; // 二重起動防止

  interval = setInterval(() => {
    if (time <= 0) {
      clearInterval(interval);
      interval = null;
      alert("終了！スコア: " + score);
      return;
    }

    time--;
    timeEl.textContent = time;
    showMole();
  }, 700);
}

// リセット
function resetGame() {
  clearInterval(interval);
  interval = null;

  score = 0;
  time = 30;
  scoreEl.textContent = score;
  timeEl.textContent = time;

  if (currentMole) currentMole.classList.remove("up");
}
</script>

</body>
</html>
