<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>モグラたたきゲーム</title>
<style>
body {
  text-align: center;
  font-family: sans-serif;
  background: #87ceeb;
}

h1 { margin-top: 10px; }

#game {
  display: grid;
  grid-template-columns: repeat(3, 120px);
  gap: 20px;
  justify-content: center;
  margin-top: 30px;
}

.hole {
  width: 120px;
  height: 120px;
  background: #654321;
  border-radius: 50%;
  position: relative;
  overflow: hidden;
}

.mole {
  width: 80px;
  height: 80px;
  background: brown;
  border-radius: 50%;
  position: absolute;
  bottom: -80px;
  left: 20px;
  transition: 0.2s;
  cursor: pointer;
}

.up {
  bottom: 20px;
}

#info {
  margin-top: 20px;
  font-size: 20px;
}
</style>
</head>
<body>

<h1>🐹 モグラたたきゲーム</h1>

<div id="info">
スコア: <span id="score">0</span> |
残り時間: <span id="time">30</span>
</div>

<div id="game"></div>

<script>
const game = document.getElementById("game");
const scoreEl = document.getElementById("score");
const timeEl = document.getElementById("time");

let score = 0;
let time = 30;
let holes = [];
let currentMole = null;

// 穴を作る
for (let i = 0; i < 9; i++) {
  let hole = document.createElement("div");
  hole.className = "hole";

  let mole = document.createElement("div");
  mole.className = "mole";

  mole.onclick = () => {
    if (mole === currentMole) {
      score++;
      scoreEl.textContent = score;
      mole.classList.remove("up");
      currentMole = null;
    }
  };

  hole.appendChild(mole);
  game.appendChild(hole);
  holes.push(mole);
}

// モグラ出現
function showMole() {
  if (currentMole) currentMole.classList.remove("up");

  let index = Math.floor(Math.random() * holes.length);
  currentMole = holes[index];
  currentMole.classList.add("up");
}

// タイマー
let gameInterval = setInterval(() => {
  if (time <= 0) {
    clearInterval(gameInterval);
    alert("終了！スコア: " + score);
    return;
  }

  time--;
  timeEl.textContent = time;

  showMole();
}, 700);

</script>

</body>
</html>
